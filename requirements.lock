# requirements.lock — gepinnter Lockfile fuer reproduzierbare Installs (Issue #202, verwandt #194)
#
# Quelle der Wahrheit fuer Versionsbereiche bleibt scripts/requirements.txt.
# Dieser Lockfile pinnt die aufgeloesten Versionen (inkl. Transitiv-Deps).
#
# Regenerieren (empfohlen, sobald pip-tools verfuegbar):
#   pip install pip-tools
#   pip-compile --output-file=requirements.lock scripts/requirements.txt
#
# Installieren:
#   pip install -r requirements.lock

