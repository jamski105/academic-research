# Search Module Registry
# Each module defines a source for academic paper discovery.
# type: api (Python httpx) | oai-pmh (XML harvest) | browser (Playwright MCP)
# tier: 1 = free or institution-direct (EBSCO OAuth, IP/bibid), 2 = requires HAN-Server proxy
# disciplines: optional filter — module only activates for matching topics

modules:
  # --- Tier 1: Free, no authentication ---
  crossref:
    enabled: true
    tier: 1
    type: api
    base_url: "https://api.crossref.org/works"
    description: "DOI registry with broad coverage across all disciplines"
    fields: "title,author,published,DOI,abstract,is-referenced-by-count,link"

  openalex:
    enabled: true
    tier: 1
    type: api
    base_url: "https://api.openalex.org/works"
    description: "Open catalog of scholarly works, authors, venues, institutions"
    fields: "title,authorships,publication_year,doi,abstract_inverted_index,cited_by_count,open_access"

  semantic_scholar:
    enabled: true
    tier: 1
    type: api
    base_url: "https://api.semanticscholar.org/graph/v1/paper/search"
    description: "AI-powered academic search with citation graphs and abstracts"
    fields: "title,authors,year,abstract,citationCount,openAccessPdf,externalIds"

  base:
    enabled: true
    tier: 1
    type: api
    base_url: "https://api.base-search.net/cgi-bin/BaseHttpSearchInterface.fcgi"
    description: "Bielefeld Academic Search Engine — 400M+ documents, strong OA coverage"

  econbiz:
    enabled: true
    tier: 1
    type: api
    base_url: "https://api.econbiz.de/v1/search"
    description: "ZBW search service for economics and business studies"
    disciplines: [economics, business, management, wirtschaftsinformatik]

  econstor:
    enabled: true
    tier: 1
    type: oai-pmh
    base_url: "https://www.econstor.eu/oai/request"
    description: "Open Access repository for economics publications"
    disciplines: [economics, business]

  repec:
    enabled: true
    tier: 1
    type: browser
    search_url: "https://ideas.repec.org/"
    search_method: form  # POST-Formular, keine direkte URL-Suche moeglich
    description: "Research Papers in Economics — working papers and journal articles via IDEAS/RePEc"
    disciplines: [economics]
    browser_guide: repec.md

  oecd:
    enabled: true
    tier: 1
    type: browser
    search_url: "https://www.oecd.org/en/search/publications.html?orderBy=mostRelevant&q="
    description: "OECD — Policy Research, Working Papers und Reports (ehemals iLibrary)"
    browser_guide: oecd.md

  google_scholar:
    enabled: true
    tier: 1
    type: browser
    description: "Google Scholar — broad academic search via Playwright MCP"
    search_url: "https://scholar.google.com/scholar?q="
    anti_scraping: true

  destatis:
    enabled: false
    tier: 1
    type: browser
    description: "German Federal Statistical Office — statistics and reports"
    search_url: "https://www.destatis.de/DE/Home/_inhalt.html"

  # --- Tier 1 Browser: Direct access (EBSCO OAuth / IP-based) ---
  ebsco:
    enabled: true
    tier: 1
    type: browser
    search_url: "https://publications.ebsco.com/?custId=ns259564&groupId=main&profileId=pfui"
    description: "EBSCO Publication Finder — Journal-Verzeichnis (NICHT Artikelsuche). Zeigt verfuegbare Zeitschriften in Business Source Premier, CASC etc. Artikelsuche via OPAC/HAN."
    browser_guide: ebscohost.md
    databases: [business_source_premier, computers_applied_sciences_complete]
    # HINWEIS: Publication Finder durchsucht Zeitschriften-Titel, nicht Artikel.
    # Fuer Artikelsuche in EBSCO-Datenbanken: OPAC nutzen (liefert HAN-Proxy-Links).

  springer:
    enabled: true
    tier: 1
    type: browser
    search_url: "https://link.springer.com/search?query="
    description: "Springer Nature — Suche frei, E-Book Volltext via HAN (Pakete: Wirtschaft + IT). Auch via OPAC erreichbar."
    browser_guide: springer.md
    han_pdf_url: "http://lfh.hh-han.com/han/springer-e-books-it/"

  ezb:
    enabled: false
    tier: 1
    type: browser
    search_url: "https://ezb.uni-regensburg.de/fl.phtml?bibid=LEIFH"
    description: "EZB — Elektronische Zeitschriftenbibliothek (22k Wirtschaft + 4.6k Informatik Journals, Ampelsystem)"
    browser_guide: ezb.md

  opac:
    enabled: true
    tier: 1
    type: browser
    auth: library
    search_url: "https://lbsvz2.gbv.de/DB=57/LNG=DU/CMD?ACT=SRCHA&IKT=1016&SRT=YOP&TRM="
    description: "Leibniz FH OPAC — Bibliothekskatalog mit Volltext-Links zu EBSCO, Springer, ProQuest via HAN"
    browser_guide: opac.md
    disciplines: [economics, business, management, wirtschaftsinformatik, informatik]
    # OPAC ist ein Meta-Gateway: Suchergebnisse enthalten Volltext-Links
    # die ueber HAN-Proxy zu EBSCO, Springer, ProQuest und EZB fuehren.
    # OPAC wird NACH den Standalone-Modulen (ebsco, springer) durchsucht,
    # um zusaetzliche Treffer zu finden die dort nicht auftauchen.
    gateway_for: [ebsco, springer, proquest, ezb]
    search_after: [ebsco, springer]

  # --- Tier 2: Requires HAN-Server login ---
  proquest:
    enabled: false
    tier: 2
    type: browser
    auth: han
    description: "ProQuest dissertations and theses"

# Mode overrides determine which modules are active per research mode
mode_overrides:
  quick:
    active_modules: [crossref, openalex, semantic_scholar]
    max_results_per_module: 20
    max_total_time: 60

  standard:
    active_tiers: [1]
    max_results_per_module: 50
    max_total_time: 180

  deep:
    active_tiers: [1, 2]
    max_results_per_module: 100
    max_total_time: 300
